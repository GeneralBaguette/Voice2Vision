<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Voice2Vision morphs flowing particles into shapes inferred from spoken descriptions."
    />
    <title>Voice2Vision</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="stage" aria-label="Flowing particle visualization"></canvas>

    <main class="panel" aria-labelledby="app-title">
      <p class="eyebrow">Browser microphone + generated height maps</p>
      <h1 id="app-title">Voice2Vision</h1>
      <p class="intro">
        Read aloud or type a scene. The app turns the latest descriptive words
        into a hidden height map, then lets particles gather where the image is
        brightest.
      </p>

      <section class="controls" aria-label="Voice and generation controls">
        <button id="listenButton" class="primary" type="button">
          Start listening
        </button>
        <button id="generateButton" type="button">Shape particles</button>
        <button id="scatterButton" type="button">Scatter</button>
      </section>

      <label class="prompt-label" for="promptInput">Heard / typed scene</label>
      <textarea
        id="promptInput"
        rows="4"
        spellcheck="true"
        placeholder="Try: bird flying over clouds at sunset"
      ></textarea>

      <div class="meter" aria-hidden="true">
        <span id="levelBar"></span>
      </div>

      <p id="status" class="status" role="status">
        Ready. Use Chrome or Edge for live speech recognition.
      </p>

      <details class="settings">
        <summary>Generator settings</summary>
        <label for="apiKeyInput">Optional Pollinations publishable key</label>
        <input
          id="apiKeyInput"
          type="password"
          autocomplete="off"
          placeholder="pk_... (leave blank for basic free use)"
        />
        <label class="check-row">
          <input id="autoGenerateInput" type="checkbox" checked />
          Auto-shape after a short speech pause
        </label>
      </details>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
